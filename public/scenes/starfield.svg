<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" aria-label="starfield">
  <style>
    @keyframes starfield_twinkle_a { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
    @keyframes starfield_twinkle_b { 0%,100% { opacity: .9; } 50% { opacity: .3; } }
    .sf-a { animation: starfield_twinkle_a 4.8s ease-in-out infinite; }
    .sf-b { animation: starfield_twinkle_b 7.2s ease-in-out infinite; }
    .sf-c { animation: starfield_twinkle_a 9.1s ease-in-out infinite; }
  </style>
