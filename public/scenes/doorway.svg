  <line x1="320" y1="260" x2="480" y2="260" stroke="#0B0B0D" stroke-width="2" opacity=".5"/>
  <circle cx="462" cy="260" r="3" fill="#E8A33D"/>
  <g stroke="#F4EFE6" stroke-width="1" opacity=".18">
    <line x1="120" y1="440" x2="320" y2="440"/>
