<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" aria-label="forest path">
  <style>
    @keyframes forest_path_drift { from { transform: translateX(0); } to { transform: translateX(-60px); } }
    .fp-mist { animation: forest_path_drift 22s linear infinite; opacity: .22; }
  </style>
  <rect width="800" height="480" fill="#0B0B0D"/>
  <g stroke="#F4EFE6" stroke-width="1" opacity=".55">
    <line x1="400" y1="300" x2="210" y2="478"/>
    <line x1="400" y1="300" x2="590" y2="478"/>
    <line x1="400" y1="300" x2="330" y2="478"/>
    <line x1="400" y1="300" x2="470" y2="478"/>
  </g>
  <g fill="#E8A33D" opacity=".82">
    <rect x="120" y="170" width="6" height="200"/>
    <rect x="200" y="140" width="7" height="240"/>
    <rect x="285" y="180" width="5" height="190"/>
    <rect x="520" y="160" width="7" height="220"/>
    <rect x="605" y="185" width="6" height="200"/>
    <rect x="680" y="150" width="8" height="240"/>
  </g>
  <g class="fp-mist">
    <rect x="-80" y="260" width="1000" height="12" fill="#F4EFE6"/>
    <rect x="-80" y="286" width="1000" height="4" fill="#F4EFE6" opacity=".6"/>
  </g>
  <circle cx="400" cy="300" r="2.5" fill="#E8A33D"/>
</svg>
