<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" aria-label="desert road">
  <style>
    @keyframes desert_road_sun { 0%,100% { opacity: .75; } 50% { opacity: 1; } }
    .dr-sun { animation: desert_road_sun 5.8s ease-in-out infinite; }
  </style>
  <rect width="800" height="480" fill="#0B0B0D"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#F4EFE6" stroke-width="0.8" opacity=".42"/>
  <circle cx="400" cy="268" r="54" fill="#E8A33D" class="dr-sun"/>
  <circle cx="400" cy="268" r="82" fill="#E8A33D" opacity=".14" class="dr-sun"/>
  <g stroke="#F4EFE6" stroke-width="1.2" fill="none">
    <line x1="400" y1="280" x2="140" y2="480"/>
    <line x1="400" y1="280" x2="660" y2="480"/>
    <line x1="400" y1="280" x2="280" y2="480" opacity=".45"/>
    <line x1="400" y1="280" x2="520" y2="480" opacity=".45"/>
  </g>
  <g stroke="#F4EFE6" stroke-width="1.4" stroke-dasharray="12 18" opacity=".6">
    <line x1="400" y1="290" x2="400" y2="480"/>
  </g>
</svg>
